events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name unicorn.n-e.kr;

        # HTTP to HTTPS redirect
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name unicorn.n-e.kr;

        ssl_certificate /etc/letsencrypt/live/unicorn.n-e.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/unicorn.n-e.kr/privkey.pem;

        # SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Docker 내장 DNS를 사용하여 IP 변경을 동적으로 반영
        resolver 127.0.0.11 valid=30s;

        # Frontend (User)
        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend (Admin)
        location /admin/ {
            set $admin_upstream http://frontend-admin:80;
            # /admin/ 요청을 frontend-admin 컨테이너의 루트(/)로 넘기기
            rewrite ^/admin/(.*) /$1 break;
            proxy_pass $admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            set $backend_upstream http://backend:8080;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }
    }
}
