services:
  mysql:
    image: mysql:8.0
    container_name: unicorn-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-unicorn}
      MYSQL_USER: ${MYSQL_USER:-unicorn}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-unicorn}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./scripts/init-db:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unicorn-backend
    env_file:
      - ${ENV_FILE:-.env.dev}
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-unicorn}
      MYSQL_USER: ${MYSQL_USER:-unicorn}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-unicorn}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: unicorn-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${ADMIN_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: unicorn-frontend-admin
    ports:
      - "${ADMIN_PORT:-3001}:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: unicorn-nginx
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
      - frontend-admin


