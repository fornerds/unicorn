spring:
  jackson:
    default-property-inclusion: always
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

server:
  servlet:
    context-path: /api/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    # 사용자 API만 기본 노출. 관리자 API는 그룹에서 "default" 선택 시 표시.
    urlsPrimaryName: ${SPRINGDOC_SWAGGER_UI_DEFAULT_GROUP:user}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

app:
  api:
    server-url:
      local: ${API_SERVER_URL_LOCAL:http://localhost:8080}
      production: ${API_SERVER_URL_PRODUCTION:https://api.example.com}
  password-reset:
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:3000}
    token-validity-minutes: ${PASSWORD_RESET_TOKEN_VALIDITY_MINUTES:60}
  mail:
    from: ${MAIL_FROM:noreply@example.com}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4.1-mini}
  s3:
    bucket: ${AWS_S3_BUCKET_NAME:unicorn-uploads}
    region: ${AWS_REGION:ap-northeast-2}
    key-prefix: ${AWS_S3_KEY_PREFIX:uploads}
  settings:
    site-name: ${SITE_NAME:Unicorn}
    payment-provider: ${PAYMENT_PROVIDER:paypal}
    domestic-pg-enabled: ${DOMESTIC_PG_ENABLED:true}
  payment:
    redirect-url-base: ${PAYMENT_REDIRECT_URL_BASE:https://pg.example.com/redirect}
    # 토스페이먼츠: API 개별 연동 키(일반결제, 국내). 결제창 연동 시 사용.
    toss:
      client-key: ${TOSS_PAYMENTS_CLIENT_KEY:}
      secret-key: ${TOSS_PAYMENTS_SECRET_KEY:}
    # PayPal: 직접 연동 (토스 경유 없음). 개발자센터에서 Client ID, Secret 발급.
    paypal:
      client-id: ${PAYPAL_CLIENT_ID:}
      client-secret: ${PAYPAL_CLIENT_SECRET:}
      sandbox: ${PAYPAL_SANDBOX:true}
    # 환율: 1 USD = ? KRW. 0이면 open.er-api.com 자동 조회(1시간 캐시).
    exchange-rate:
      krw-per-usd: ${EXCHANGE_RATE_KRW_PER_USD:0}
      api-url: ${EXCHANGE_RATE_API_URL:https://open.er-api.com/v6/latest/USD}
  oauth:
    callback-base-url: ${OAUTH_CALLBACK_BASE_URL:http://localhost:18080/api/v1}
    frontend-redirect-url: ${OAUTH_FRONTEND_REDIRECT_URL:http://localhost:3000}
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  jwt:
    access-token-cookie-name: ${JWT_ACCESS_TOKEN_COOKIE_NAME:access_token}
    refresh-token-cookie-name: ${JWT_REFRESH_TOKEN_COOKIE_NAME:refresh_token}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    access-secret: ${JWT_ACCESS_SECRET:dev-access-secret-min-256-bits-for-hmac-sha256}
    refresh-secret: ${JWT_REFRESH_SECRET:dev-refresh-secret-min-256-bits-for-hmac-sha256}
    access-expiration-ms: ${JWT_ACCESS_EXPIRE_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRE_MS:604800000}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
